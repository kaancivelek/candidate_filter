<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Intelligent Cloud HR{% endblock %}</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        /* المتغيرات (الألوان الأساسية للنظام) */
        :root {
            --primary-color: #1e293b; 
            --secondary-color: #3b82f6; 
            --background-color: #f8fafc; 
            --surface-color: #ffffff; 
            --text-main: #334155; 
            --text-light: #94a3b8; 
            --border-color: #e2e8f0; 
        }

        /* تصفير التنسيقات الافتراضية وإضافة التمرير الناعم */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html {
            scroll-behavior: smooth; /* التمرير الناعم عند النقر على روابط التوجيه داخل الصفحة */
        }

        body {
            background-color: var(--background-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 1. الشريط الجانبي (Sidebar) */
        .sidebar {
            width: 260px;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 24px;
            font-size: 1.2rem;
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header .material-symbols-outlined {
            color: var(--secondary-color);
        }

        .nav-links {
            list-style: none;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .nav-links li a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 24px;
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-links li a:hover, .nav-links li a.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border-left: 4px solid var(--secondary-color);
        }

        /* 2. منطقة المحتوى الرئيسية (Main Layout) */
        .main-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 3. الشريط العلوي (Navbar) */
        .navbar {
            height: 70px;
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .navbar-title {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        /* تنسيقات القائمة المنسدلة للملف الشخصي */
        .dropdown-container {
            position: relative;
            padding-bottom: 10px;
            margin-bottom: -10px;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background-color: var(--surface-color);
            min-width: 200px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            z-index: 1000;
            overflow: hidden;
        }

        .dropdown-container:hover .dropdown-menu {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dropdown-menu a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
            padding: 12px 16px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .dropdown-menu a:hover {
            background-color: #f1f5f9;
            color: var(--secondary-color);
        }

        .dropdown-menu a .material-symbols-outlined {
            font-size: 20px;
        }
        
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: var(--secondary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        /* 4. منطقة المحتوى المتغيرة (Content Area) */
        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        /* تنسيقات مساعدة للبطاقات */
        .card {
            background-color: var(--surface-color);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }
        
        /* تنسيقات نظام رسائل التنبيهات */
        .alert-messages {
            margin-bottom: 20px;
        }
        .alert {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .alert-success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #34d399;
        }
        .alert-error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #f87171;
        }
    </style>
</head>
<body>

    {% include 'partials/sidebar.html' %}

    <main class="main-layout">
        
        {% include 'partials/navbar.html' %}

        <section class="content-area">
            
            {% if messages %}
                <div class="alert-messages">
                    {% for message in messages %}
                        <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                            {{ message }}
                            <span class="material-symbols-outlined" style="cursor: pointer; font-size: 20px;" onclick="this.parentElement.style.display='none';">close</span>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block content %}
            {% endblock %}
        </section>
        
    </main>

</body>
</html>
