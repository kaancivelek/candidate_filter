<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Intelligent Cloud HR</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        :root {
            --primary-color: #1e293b;
            --secondary-color: #3b82f6;
            --background-color: #f8fafc;
            --surface-color: #ffffff;
            --text-main: #334155;
            --text-light: #94a3b8;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, #e2e8f0 0%, #f8fafc 100%);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 48px;
            color: var(--secondary-color);
            margin-bottom: 12px;
        }

        .login-header h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            color: var(--text-light);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .material-symbols-outlined {
            position: absolute;
            left: 12px;
            color: var(--text-light);
            font-size: 20px;
        }

        .form-control {
            width: 100%;
            padding: 12px 12px 12px 42px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: all 0.2s;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 20px;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .back-to-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-to-login:hover {
            color: var(--secondary-color);
        }
        
        .back-to-login .material-symbols-outlined {
            font-size: 18px;
        }

        .errorlist {
            list-style: none;
            color: #ef4444;
            font-size: 0.85rem;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #fef2f2;
            border-radius: 8px;
            border: 1px solid #fee2e2;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="material-symbols-outlined logo-icon">lock_reset</span>
                <h1>Forgot Password?</h1>
                <p>Enter your email address and we'll send you a link to reset your password.</p>
            </div>

            <form action="{% url 'password_reset' %}" method="POST">
                {% csrf_token %}
                
                {% if messages %}
                    <ul class="errorlist">
                        {% for message in messages %}
                            <li>{{ message }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}

                <div class="form-group">
                    <label for="id_email">Email Address</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-outlined">mail</span>
                        <input type="email" name="email" id="id_email" class="form-control" placeholder="admin@company.com" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Send Reset Link</button>
            </form>

            <a href="{% url 'login' %}" class="back-to-login">
                <span class="material-symbols-outlined">arrow_back</span>
                Back to Login
            </a>
        </div>
    </div>

</body>
</html>
