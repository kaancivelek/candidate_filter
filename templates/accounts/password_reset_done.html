<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Sent | Intelligent Cloud HR</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        :root {
            --primary-color: #1e293b;
            --secondary-color: #3b82f6;
            --success-color: #10b981; /* لون أخضر للنجاح */
            --background-color: #f8fafc;
            --surface-color: #ffffff;
            --text-main: #334155;
            --text-light: #94a3b8;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, #e2e8f0 0%, #f8fafc 100%);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            text-align: center; /* توسيط كل المحتوى في هذه الصفحة */
        }

        /* أيقونة النجاح/البريد */
        .icon-wrapper {
            width: 80px;
            height: 80px;
            background-color: #d1fae5; /* خلفية خضراء باهتة */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px auto;
        }

        .logo-icon {
            font-size: 40px;
            color: var(--success-color);
        }

        .login-header h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 12px;
        }

        .login-header p {
            color: var(--text-light);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        /* تنسيق صندوق ملاحظة إضافية */
        .info-box {
            background-color: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-main);
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .btn-outline {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            background-color: #f1f5f9;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            
            <div class="icon-wrapper">
                <span class="material-symbols-outlined logo-icon">mark_email_read</span>
            </div>
            
            <div class="login-header">
                <h1>Check Your Email</h1>
                <p>We have emailed you instructions for setting your password, if an account exists with the email you entered.</p>
            </div>

            <div class="info-box">
                Didn't receive an email? Check your spam folder or make sure you typed the address correctly.
            </div>

            <a href="{% url 'login' %}" class="btn-outline">
                <span class="material-symbols-outlined">arrow_back</span>
                Back to Login
            </a>
            
        </div>
    </div>

</body>
</html>
